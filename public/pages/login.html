<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DSM | Login</title>
    <link rel="icon" href="https://www.cps.sp.gov.br/favicon.ico" />
    <link rel="stylesheet" href="/assets/css/main.css" />
  </head>
  <body>
    <main class="card">
      <h1 class="title">Login</h1>
      <form class="aut-form" action="#" method="post">
        <label for="email">Email</label>
        <input type="email" required id="email"/>

        <label for="senha">Senha</label>
        <input type="password" required id="senha"/>
      </form>
      <br>
      <div class="actions">
        <button class="btn-link">Entrar</button>
        <a class="btn-link" href="/cadastro">Ir para cadastro</a>
        <a class="btn-link btn-secondary" href="/">Voltar</a>
      </div>
    </main>
  </body>
</html>
